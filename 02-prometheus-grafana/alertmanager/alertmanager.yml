global:
  resolve_timeout: 1m
  slack_api_url_file: ''   # we use webhook URL inline below

route:
  receiver: 'slack-default'
  group_by: ['alertname', 'service']
  group_wait: 10s
  group_interval: 1m
  repeat_interval: 1h
  routes:
    - matchers:
        - severity = "critical"
      receiver: 'slack-critical'
      continue: true
    - matchers:
        - severity = "warning"
      receiver: 'slack-default'

receivers:
  - name: 'slack-default'
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/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'
        channel: '#observability'
        send_resolved: true
        title: '{{ if eq .Status "firing" }}🔥{{ else }}✅{{ end }} {{ .GroupLabels.alertname }}'
        text: |
          {{ range .Alerts }}
          *{{ .Annotations.summary }}*
          {{ .Annotations.description }}
          *Runbook:* {{ .Annotations.runbook_url }}
          {{ end }}

  - name: 'slack-critical'
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/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'
        channel: '#oncall'
        send_resolved: true
        title: '🚨 CRITICAL: {{ .GroupLabels.alertname }}'
        text: |
          {{ range .Alerts }}
          *{{ .Annotations.summary }}*
          {{ .Annotations.description }}
          *Runbook:* {{ .Annotations.runbook_url }}
          {{ end }}

inhibit_rules:
  # If the whole service is down, don't also page about latency on it.
  - source_matchers: [alertname = "ServiceDown"]
    target_matchers: [severity = "warning"]
    equal: [service]
